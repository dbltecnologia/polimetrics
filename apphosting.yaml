# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Firebase Admin SDK (service account JSON armazenado no Secret Manager)
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY
    availability:
      - RUNTIME

  # Google Maps API Key (necessária para geocoding no server-side)
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    secret: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    availability:
      - BUILD
      - RUNTIME

  # Firebase Web Config (necessário para autenticação no cliente)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  # === SECRETÁRIO VIRTUAL IA ===

  # Gemini (Google AI) — provedor principal de texto
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME

  # OpenAI — fallback de texto/imagem
  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY
    availability:
      - RUNTIME

  # ElevenLabs — síntese de voz
  - variable: ELEVENLABS_API_KEY
    secret: ELEVENLABS_API_KEY
    availability:
      - RUNTIME

  # === CHATWOOT / WHATSAPP ===

  - variable: CHATWOOT_BASE_URL
    secret: CHATWOOT_BASE_URL
    availability:
      - RUNTIME

  - variable: CHATWOOT_API_TOKEN
    secret: CHATWOOT_API_TOKEN
    availability:
      - RUNTIME

  - variable: CHATWOOT_ACCOUNT_ID
    secret: CHATWOOT_ACCOUNT_ID
    availability:
      - RUNTIME

  - variable: CHATWOOT_INBOX_ID
    secret: CHATWOOT_INBOX_ID
    availability:
      - RUNTIME
